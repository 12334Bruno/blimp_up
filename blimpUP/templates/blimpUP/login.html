{% extends "blimpUP/layout.html" %}

{% block body %}
    <div id="page-body">
        <div id="page-container">
            <div id="login-container">
                <h2>Login</h2>

                {% if message %}
                    <div style="color: red;">{{ message }}</div>
                {% endif %}

                <form action="{% url 'login' %}" method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <input autofocus class="form-control" type="text" name="username" placeholder="Username" value="{{ username }}">
                        {% if message %}
                            <ul class="errorlist"></ul>
                        {% endif %}
                    </div>
                    <div class="form-group">
                        <input class="form-control" type="password" name="password" placeholder="Password" value="{{ password }}">
                        {% if message %}
                            <ul class="errorlist"></ul>
                        {% endif %}
                    </div>
                    <div id="btns-field">
                        <a class="btn btn-secondary btncancel" href="{% url 'index' %}">Cancel</a>
                        <input class="btn btn-primary btnconfrim" type="submit" value="Login">
                    </div>
                </form>

                Don't have an account? <a href="{% url 'register' %}">Register here.</a>
            </div>
        </div>
    </div>
{% endblock %}
